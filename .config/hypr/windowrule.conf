# Hyprland window rules configuration file

# Ignore maximize requests from apps
# windowrule = suppressevent maximize, match:class .*

# Fix some dragging issues with XWayland
# windowrule = nofocus on, match:class ^$,title ^$,xwayland 1,floating 1,fullscreen 0,pinned 0

# ─── Floating windows ───────────────────────────────────────────────────────
windowrule = float on, match:class blueman-manager
windowrule = float on, match:class org.pulseaudio.pavucontrol
windowrule = float on, match:title Volume Control
windowrule = float on, match:class xed
windowrule = float on, match:title Media viewer
windowrule = float on, match:title Picture-in-Picture
windowrule = float on, match:class Viewnior
windowrule = float on, match:title DevTools
windowrule = float on, match:class file_progress
windowrule = float on, match:class confirm
windowrule = float on, match:class dialog
windowrule = float on, match:class download
windowrule = float on, match:class notification
windowrule = float on, match:class error
windowrule = float on, match:class confirmreset
windowrule = float on, match:title Open File
windowrule = float on, match:title branchdialog
windowrule = float on, match:title Confirm to replace files
windowrule = float on, match:title File Operation Progress

# ─── Size and position ───────────────────────────────────────────────────────
windowrule = size 450 600, match:class xed
windowrule = size 500 400, match:title Volume Control
windowrule = size 500 400, match:class blueman-manager

# ─── Opacity ─────────────────────────────────────────────────────────────────
windowrule = opacity 0.80 override 0.70 override, match:class blueman-manager
windowrule = opacity 0.80 override 0.70 override, match:class org.pulseaudio.pavucontrol
windowrule = opacity 0.80 override 0.70 override, match:title Volume Control
windowrule = opacity 0.80 override 0.70 override, match:class spotify
windowrule = opacity 0.80 override 0.80 override, match:class xed
windowrule = opacity 0.80 override 0.70 override, match:class nemo
windowrule = opacity 0.90 override 0.90 override, match:class marktext

